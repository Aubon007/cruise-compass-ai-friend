services:
  - type: web
    name: cruise-compass-ai-friend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: AUTH_EMAIL
        sync: false
      - key: AUTH_PIN
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.6-sol
